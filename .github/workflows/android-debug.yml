name: Build Android Debug APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  build-debug-apk:
    name: Build Debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract project ZIP if needed
        shell: bash
        run: |
          set -euo pipefail

          if find . -maxdepth 5 -type f \( -name 'settings.gradle' -o -name 'settings.gradle.kts' \) | grep -q .; then
            echo "Gradle project already extracted."
            exit 0
          fi

          ZIP_FILE="$(find . -maxdepth 1 -type f -name 'ImmuneErrorRadar*.zip' | sort -V | tail -n 1 || true)"

          if [ -z "$ZIP_FILE" ]; then
            echo "ERROR: No extracted Gradle project and no ImmuneErrorRadar*.zip found."
            find . -maxdepth 3 -type f | sort
            exit 1
          fi

          echo "Extracting project ZIP: $ZIP_FILE"
          mkdir -p .ci_project
          unzip -q "$ZIP_FILE" -d .ci_project

          echo "Extraction complete."
          find .ci_project -maxdepth 4 -type f | sort | head -n 100

      - name: Locate Gradle project root
        shell: bash
        run: |
          set -euo pipefail

          echo "Searching for settings.gradle / settings.gradle.kts..."

          SETTINGS_FILE="$(find . -path './.git' -prune -o -type f \( -name 'settings.gradle' -o -name 'settings.gradle.kts' \) -print | head -n 1 || true)"

          if [ -z "$SETTINGS_FILE" ]; then
            echo "ERROR: No Gradle settings file found after extraction."
            echo "Repository structure:"
            find . -maxdepth 5 -type f | sort | head -n 300
            exit 1
          fi

          PROJECT_DIR="$(dirname "$SETTINGS_FILE")"

          echo "Gradle settings file found: $SETTINGS_FILE"
          echo "Gradle project root found: $PROJECT_DIR"
          echo "PROJECT_DIR=$PROJECT_DIR" >> "$GITHUB_ENV"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Make Gradle wrapper executable if present
        shell: bash
        run: |
          cd "$PROJECT_DIR"
          if [ -f "./gradlew" ]; then
            chmod +x ./gradlew
          fi

      - name: Run project static checks
        shell: bash
        run: |
          cd "$PROJECT_DIR"

          if [ -f "scripts/run_static_checks.sh" ]; then
            chmod +x scripts/run_static_checks.sh
            bash scripts/run_static_checks.sh
          else
            echo "No scripts/run_static_checks.sh found. Skipping static checks."
          fi

      - name: Run unit tests
        shell: bash
        run: |
          cd "$PROJECT_DIR"

          if [ -f "./gradlew" ]; then
            ./gradlew :app:testDebugUnitTest --stacktrace
          else
            gradle :app:testDebugUnitTest --stacktrace
          fi

      - name: Build debug APK
        shell: bash
        run: |
          cd "$PROJECT_DIR"

          if [ -f "./gradlew" ]; then
            ./gradlew :app:assembleDebug --stacktrace
          else
            gradle :app:assembleDebug --stacktrace
          fi

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: ImmuneErrorRadar-debug-apk
          path: ${{ env.PROJECT_DIR }}/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 14
