name: Build Android Debug APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  build-debug-apk:
    name: Build Debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract project ZIP if needed
        shell: bash
        run: |
          set -euo pipefail

          echo "Checking whether Gradle project already exists..."

          SETTINGS_CANDIDATES="$(mktemp)"
          find . -maxdepth 5 \
            -path './.git' -prune -o \
            -type f \( -name 'settings.gradle' -o -name 'settings.gradle.kts' \) \
            -print > "$SETTINGS_CANDIDATES"

          if [ -s "$SETTINGS_CANDIDATES" ]; then
            echo "Gradle project already extracted."
            echo "Detected settings file:"
            sed -n '1p' "$SETTINGS_CANDIDATES"
            exit 0
          fi

          ZIP_CANDIDATES="$(mktemp)"
          find . -maxdepth 1 -type f -name 'ImmuneErrorRadar*.zip' -print > "$ZIP_CANDIDATES"

          if [ ! -s "$ZIP_CANDIDATES" ]; then
            echo "ERROR: No extracted Gradle project and no ImmuneErrorRadar*.zip found."
            echo "Repository files:"
            REPO_FILES="$(mktemp)"
            find . -maxdepth 3 -type f -print > "$REPO_FILES"
            sort "$REPO_FILES" > "${REPO_FILES}.sorted"
            sed -n '1,300p' "${REPO_FILES}.sorted"
            exit 1
          fi

          ZIP_FILE="$(sort -V "$ZIP_CANDIDATES" | tail -n 1)"

          echo "Extracting project ZIP: $ZIP_FILE"
          rm -rf .ci_project
          mkdir -p .ci_project
          unzip -q "$ZIP_FILE" -d .ci_project

          echo "Extraction complete. Preview:"
          PREVIEW_FILES="$(mktemp)"
          find .ci_project -maxdepth 4 -type f -print > "$PREVIEW_FILES"
          sort "$PREVIEW_FILES" > "${PREVIEW_FILES}.sorted"
          sed -n '1,150p' "${PREVIEW_FILES}.sorted"

      - name: Locate Gradle project root
        shell: bash
        run: |
          set -euo pipefail

          echo "Searching for settings.gradle / settings.gradle.kts..."

          SETTINGS_FILES="$(mktemp)"
          find . \
            -path './.git' -prune -o \
            -type f \( -name 'settings.gradle' -o -name 'settings.gradle.kts' \) \
            -print > "$SETTINGS_FILES"

          if [ ! -s "$SETTINGS_FILES" ]; then
            echo "ERROR: No Gradle settings file found after extraction."
            echo "Repository structure:"
            STRUCTURE_FILES="$(mktemp)"
            find . -maxdepth 6 -type f -print > "$STRUCTURE_FILES"
            sort "$STRUCTURE_FILES" > "${STRUCTURE_FILES}.sorted"
            sed -n '1,300p' "${STRUCTURE_FILES}.sorted"
            exit 1
          fi

          SETTINGS_FILE="$(sed -n '1p' "$SETTINGS_FILES")"
          PROJECT_DIR="$(dirname "$SETTINGS_FILE")"

          echo "Gradle settings file found: $SETTINGS_FILE"
          echo "Gradle project root found: $PROJECT_DIR"
          echo "PROJECT_DIR=$PROJECT_DIR" >> "$GITHUB_ENV"

      - name: Ensure AndroidX Gradle properties
        shell: bash
        run: |
          set -euo pipefail

          cd "$PROJECT_DIR"

          touch gradle.properties

          if grep -q '^android.useAndroidX=' gradle.properties; then
            sed -i 's/^android.useAndroidX=.*/android.useAndroidX=true/' gradle.properties
          else
            echo 'android.useAndroidX=true' >> gradle.properties
          fi

          if grep -q '^android.enableJetifier=' gradle.properties; then
            sed -i 's/^android.enableJetifier=.*/android.enableJetifier=true/' gradle.properties
          else
            echo 'android.enableJetifier=true' >> gradle.properties
          fi

          if ! grep -q '^org.gradle.jvmargs=' gradle.properties; then
            echo 'org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8' >> gradle.properties
          fi

          if ! grep -q '^kotlin.code.style=' gradle.properties; then
            echo 'kotlin.code.style=official' >> gradle.properties
          fi

          echo "gradle.properties:"
          cat gradle.properties

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Make Gradle wrapper executable if present
        shell: bash
        run: |
          set -euo pipefail

          cd "$PROJECT_DIR"

          if [ -f "./gradlew" ]; then
            chmod +x ./gradlew
            echo "Using Gradle wrapper."
          else
            echo "No Gradle wrapper found. Using installed Gradle 8.9."
          fi

      - name: Clean generated artifacts before static checks
        shell: bash
        run: |
          set -euo pipefail

          echo "Cleaning generated artifacts before release hygiene/static checks..."

          rm -rf .gradle
          rm -rf build

          if [ -n "${PROJECT_DIR:-}" ] && [ -d "$PROJECT_DIR" ]; then
            find "$PROJECT_DIR" \
              -type d \( -name ".gradle" -o -name "build" \) \
              -prune -exec rm -rf {} +

            find "$PROJECT_DIR" \
              -type f \( -name "*.apk" -o -name "*.aab" -o -name "*.aar" \) \
              -delete
          fi

          echo "Generated artifact cleanup complete."

          echo "Forbidden generated artifacts remaining before static checks:"
          REMAINING_ARTIFACTS="$(mktemp)"
          find "$PROJECT_DIR" \( \
            -type d \( -name ".gradle" -o -name "build" \) \
            -o -type f \( -name "*.apk" -o -name "*.aab" -o -name "*.aar" \) \
          \) -print > "$REMAINING_ARTIFACTS" || true

          if [ -s "$REMAINING_ARTIFACTS" ]; then
            cat "$REMAINING_ARTIFACTS"
          else
            echo "None."
          fi

      - name: Run project static checks
        shell: bash
        run: |
          set -euo pipefail

          cd "$PROJECT_DIR"

          if [ -f "scripts/run_static_checks.sh" ]; then
            chmod +x scripts/run_static_checks.sh
            bash scripts/run_static_checks.sh
          else
            echo "No scripts/run_static_checks.sh found. Skipping static checks."
          fi

      - name: Run unit tests
        shell: bash
        run: |
          set -euo pipefail

          cd "$PROJECT_DIR"

          if [ -f "./gradlew" ]; then
            ./gradlew :app:testDebugUnitTest --stacktrace
          else
            gradle :app:testDebugUnitTest --stacktrace
          fi

      - name: Build debug APK
        shell: bash
        run: |
          set -euo pipefail

          cd "$PROJECT_DIR"

          if [ -f "./gradlew" ]; then
            ./gradlew :app:assembleDebug --stacktrace
          else
            gradle :app:assembleDebug --stacktrace
          fi

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: ImmuneErrorRadar-debug-apk
          path: ${{ env.PROJECT_DIR }}/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 14
