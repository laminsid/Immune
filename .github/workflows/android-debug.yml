name: Build Android Debug APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  build-debug-apk:
    name: Build Debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Locate Gradle project root
        shell: bash
        run: |
          set -e

          echo "Searching for settings.gradle / settings.gradle.kts..."

          PROJECT_DIR="$(find . -maxdepth 3 \( -name 'settings.gradle' -o -name 'settings.gradle.kts' \) -print -quit | xargs dirname)"

          if [ -z "$PROJECT_DIR" ] || [ "$PROJECT_DIR" = "." ]; then
            if [ -f "settings.gradle" ] || [ -f "settings.gradle.kts" ]; then
              PROJECT_DIR="."
            fi
          fi

          if [ -z "$PROJECT_DIR" ]; then
            echo "ERROR: No Gradle settings file found."
            echo "Repository files:"
            find . -maxdepth 3 -type f | sort
            exit 1
          fi

          echo "Gradle project root found: $PROJECT_DIR"
          echo "PROJECT_DIR=$PROJECT_DIR" >> "$GITHUB_ENV"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Make Gradle wrapper executable if present
        shell: bash
        run: |
          cd "$PROJECT_DIR"
          if [ -f "./gradlew" ]; then
            chmod +x ./gradlew
          fi

      - name: Run project static checks
        shell: bash
        run: |
          cd "$PROJECT_DIR"

          if [ -f "scripts/run_static_checks.sh" ]; then
            chmod +x scripts/run_static_checks.sh
            bash scripts/run_static_checks.sh
          else
            echo "No scripts/run_static_checks.sh found. Skipping static checks."
          fi

      - name: Run unit tests
        shell: bash
        run: |
          cd "$PROJECT_DIR"

          if [ -f "./gradlew" ]; then
            ./gradlew :app:testDebugUnitTest --stacktrace
          else
            gradle :app:testDebugUnitTest --stacktrace
          fi

      - name: Build debug APK
        shell: bash
        run: |
          cd "$PROJECT_DIR"

          if [ -f "./gradlew" ]; then
            ./gradlew :app:assembleDebug --stacktrace
          else
            gradle :app:assembleDebug --stacktrace
          fi

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: ImmuneErrorRadar-debug-apk
          path: |
            ${{ env.PROJECT_DIR }}/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 14
